name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # MetaTrader5 is a Windows-only dependency (see the sys_platform == 'win32'
      # marker in pyproject.toml), so it is intentionally NOT installed here.
      # The test suite runs against a fake in-memory MT5 module, so it passes on
      # Linux without a real terminal.
      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest
